name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy values so `next build` can run without real secrets.
          # Pages are dynamic (force-dynamic), so no live calls happen at build time.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key
          SUPABASE_SERVICE_ROLE_KEY: dummy_service_key
          ANTHROPIC_API_KEY: dummy_anthropic_key
          OWNER_EMAIL: ci@example.com
          CRON_SECRET: ci_dummy_secret
